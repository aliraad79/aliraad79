name: Download RPM Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL or ID (leave empty to just list videos)'
        required: false
        default: ''

jobs:
  list-videos:
    if: inputs.video_url == ''
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: List recent videos
        run: |
          echo "=== Recent videos from Rocketpoweredmohawk ==="
          yt-dlp --flat-playlist --playlist-end 20 --print "%(id)s | %(title)s | %(upload_date)s" "https://www.youtube.com/@rocketpoweredmohawk/videos"

  download-video:
    if: inputs.video_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Debug Invidious and Piped responses
        run: |
          set +e
          VIDEO_ID=$(echo "${{ inputs.video_url }}" | grep -oP 'v=\K[^&]+' || echo "${{ inputs.video_url }}")

          echo "=== Invidious yewtu.be raw response ==="
          curl -s --max-time 15 "https://yewtu.be/api/v1/videos/$VIDEO_ID" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('Title:', d.get('title'))
          print('formatStreams count:', len(d.get('formatStreams',[])))
          for s in d.get('formatStreams',[]):
            print('  format:', s.get('qualityLabel'), s.get('container'), 'url:', s.get('url','')[:80] if s.get('url') else 'NONE')
          print('adaptiveFormats count:', len(d.get('adaptiveFormats',[])))
          for s in d.get('adaptiveFormats',[])[:5]:
            print('  adaptive:', s.get('qualityLabel'), s.get('type','')[:40], 'url:', s.get('url','')[:80] if s.get('url') else 'NONE')
          print()
          print('Full keys:', list(d.keys()))
          " 2>&1

          echo ""
          echo "=== Piped adminforge raw response ==="
          curl -s --max-time 15 "https://pipedapi.adminforge.de/streams/$VIDEO_ID" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          print('Title:', d.get('title'))
          print('videoStreams count:', len(d.get('videoStreams',[])))
          for s in d.get('videoStreams',[])[:8]:
            print('  stream:', s.get('quality'), 'videoOnly:', s.get('videoOnly'), 'url:', (s.get('url','')[:100] if s.get('url') else 'NONE'))
          print('audioStreams count:', len(d.get('audioStreams',[])))
          for s in d.get('audioStreams',[])[:3]:
            print('  audio:', s.get('quality'), 'url:', (s.get('url','')[:100] if s.get('url') else 'NONE'))
          print('proxyUrl:', d.get('proxyUrl','')[:100])
          print('hls:', d.get('hls','')[:100])
          print()
          print('Full keys:', list(d.keys()))
          " 2>&1
