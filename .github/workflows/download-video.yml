name: Download RPM Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL or ID (leave empty to just list videos)'
        required: false
        default: ''

jobs:
  list-videos:
    if: inputs.video_url == ''
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: List recent videos
        run: |
          echo "=== Recent videos from Rocketpoweredmohawk ==="
          yt-dlp --flat-playlist --playlist-end 20 --print "%(id)s | %(title)s | %(upload_date)s" "https://www.youtube.com/@rocketpoweredmohawk/videos"

  download-video:
    if: inputs.video_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Try all methods
        shell: bash
        run: |
          set +e
          VIDEO_ID=$(echo "${{ inputs.video_url }}" | grep -oP 'v=\K[^&]+' || echo "${{ inputs.video_url }}")
          echo "Video ID: $VIDEO_ID"

          echo "=== Raw curl to yewtu.be ==="
          curl -sv --max-time 15 "https://yewtu.be/api/v1/videos/$VIDEO_ID" 2>&1 | head -50

          echo ""
          echo "=== Raw curl to inv.nadeko.net ==="
          curl -sv --max-time 15 "https://inv.nadeko.net/api/v1/videos/$VIDEO_ID" 2>&1 | head -50

          echo ""
          echo "=== Raw curl to pipedapi.adminforge.de ==="
          curl -sv --max-time 15 "https://pipedapi.adminforge.de/streams/$VIDEO_ID" 2>&1 | head -50

          echo ""
          echo "=== Try vid.puffyan.us with local=true ==="
          curl -s --max-time 15 "https://vid.puffyan.us/api/v1/videos/$VIDEO_ID?local=true" 2>&1 | python3 -c "
          import json,sys
          try:
            d=json.load(sys.stdin)
            print('Title:', d.get('title'))
            print('formatStreams:', len(d.get('formatStreams',[])))
            for s in d.get('formatStreams',[]):
              print('  quality:', s.get('qualityLabel'), 'url:', (s.get('url','')[:120] if s.get('url') else 'NONE'))
            print('adaptiveFormats:', len(d.get('adaptiveFormats',[])))
            for s in d.get('adaptiveFormats',[])[:5]:
              print('  type:', s.get('type','')[:50], 'url:', (s.get('url','')[:120] if s.get('url') else 'NONE'))
          except Exception as e:
            print('Parse error:', e)
            sys.stdin.seek(0)
          " 2>&1 || echo "Failed"

          echo ""
          echo "=== Try yewtu.be with local=true ==="
          curl -s --max-time 15 "https://yewtu.be/api/v1/videos/$VIDEO_ID?local=true" 2>&1 | python3 -c "
          import json,sys
          try:
            d=json.load(sys.stdin)
            print('Title:', d.get('title'))
            print('formatStreams:', len(d.get('formatStreams',[])))
            for s in d.get('formatStreams',[]):
              print('  quality:', s.get('qualityLabel'), 'url:', (s.get('url','')[:150] if s.get('url') else 'NONE'))
            print('adaptiveFormats:', len(d.get('adaptiveFormats',[])))
            for s in d.get('adaptiveFormats',[])[:5]:
              print('  type:', s.get('type','')[:50], 'url:', (s.get('url','')[:150] if s.get('url') else 'NONE'))
          except Exception as e:
            print('Parse error:', e)
          " 2>&1 || echo "Failed"

          echo ""
          echo "=== Try download if we got URLs ==="
          STREAM=$(curl -s --max-time 15 "https://yewtu.be/api/v1/videos/$VIDEO_ID?local=true" 2>/dev/null | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for s in d.get('formatStreams',[]):
            if s.get('url'):
              print(s['url']); sys.exit(0)
          for s in d.get('adaptiveFormats',[]):
            if s.get('url') and 'video' in s.get('type',''):
              print(s['url']); sys.exit(0)
          " 2>/dev/null)

          if [ -n "$STREAM" ]; then
            echo "Got stream URL, downloading..."
            curl -L --max-time 600 -o rpm_video.mp4 "$STREAM"
            ls -lh rpm_video.mp4 2>/dev/null
          else
            echo "No stream URLs found anywhere"
          fi

          # Final check
          if [ -f rpm_video.mp4 ] && [ "$(stat -c%s rpm_video.mp4 2>/dev/null)" -gt 100000 ]; then
            echo "SUCCESS!"
          else
            echo "FAILED"
            exit 1
          fi

      - name: Upload as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpm-video
          path: rpm_video.mp4
          retention-days: 1
          if-no-files-found: ignore
