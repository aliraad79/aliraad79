name: Download RPM Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL to download (leave empty to just list videos)'
        required: false
        default: ''

jobs:
  list-videos:
    if: inputs.video_url == ''
    runs-on: ubuntu-latest
    steps:
      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: List recent videos
        run: |
          echo "=== Recent videos from Rocketpoweredmohawk ==="
          yt-dlp --flat-playlist --playlist-end 20 --print "%(id)s | %(title)s | %(upload_date)s" "https://www.youtube.com/@rocketpoweredmohawk/videos"

  download-video:
    if: inputs.video_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Install tools
        run: pip install yt-dlp

      - name: Download via alternative frontends
        run: |
          set +e
          VIDEO_ID=$(echo "${{ inputs.video_url }}" | grep -oP 'v=\K[^&]+')
          echo "Video ID: $VIDEO_ID"

          # Try Invidious instances with yt-dlp
          echo "=== Trying Invidious instances with yt-dlp ==="
          for INSTANCE in "yewtu.be" "inv.nadeko.net" "invidious.nerdvpn.de" "iv.datura.network"; do
            echo "--- Trying https://$INSTANCE/watch?v=$VIDEO_ID ---"
            yt-dlp -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
              --merge-output-format mp4 \
              -o "rpm_video.mp4" \
              "https://$INSTANCE/watch?v=$VIDEO_ID" 2>&1
            if [ -f rpm_video.mp4 ] && [ -s rpm_video.mp4 ]; then
              echo "SUCCESS with $INSTANCE via yt-dlp!"
              exit 0
            fi
            rm -f rpm_video.mp4
          done

          # Try Piped instances with yt-dlp
          echo "=== Trying Piped instances with yt-dlp ==="
          for INSTANCE in "piped.kavin.rocks" "piped.video" "piped.adminforge.de" "piped.leptons.xyz"; do
            echo "--- Trying https://$INSTANCE/watch?v=$VIDEO_ID ---"
            yt-dlp -f "bestvideo[height<=720]+bestaudio/best[height<=720]/best" \
              --merge-output-format mp4 \
              -o "rpm_video.mp4" \
              "https://$INSTANCE/watch?v=$VIDEO_ID" 2>&1
            if [ -f rpm_video.mp4 ] && [ -s rpm_video.mp4 ]; then
              echo "SUCCESS with $INSTANCE via yt-dlp!"
              exit 0
            fi
            rm -f rpm_video.mp4
          done

          # Try Piped API direct download
          echo "=== Trying Piped API direct stream download ==="
          for API in "https://pipedapi.kavin.rocks" "https://pipedapi.adminforge.de" "https://api.piped.yt"; do
            echo "--- Trying $API ---"
            JSON=$(curl -s --max-time 15 "$API/streams/$VIDEO_ID")
            if echo "$JSON" | python3 -c "import json,sys; json.load(sys.stdin)" 2>/dev/null; then
              # Try to get a combined audio+video stream
              STREAM_URL=$(echo "$JSON" | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          # First try formatStreams (combined a+v)
          for s in d.get('formatStreams',[]):
            q = s.get('quality','')
            if '720' in q or '480' in q or '360' in q:
              print(s['url']); sys.exit(0)
          fs = d.get('formatStreams',[])
          if fs:
            print(fs[-1]['url']); sys.exit(0)
          # Fallback: videoStreams that are not videoOnly
          for s in d.get('videoStreams',[]):
            if not s.get('videoOnly',True):
              print(s['url']); sys.exit(0)
          " 2>/dev/null)
              if [ -n "$STREAM_URL" ]; then
                echo "Found stream URL, downloading..."
                curl -L --max-time 600 -o rpm_video.mp4 "$STREAM_URL"
                if [ -f rpm_video.mp4 ] && [ -s rpm_video.mp4 ]; then
                  SIZE=$(stat -c%s rpm_video.mp4)
                  echo "Downloaded $SIZE bytes"
                  if [ "$SIZE" -gt 10000 ]; then
                    echo "SUCCESS with $API!"
                    exit 0
                  fi
                fi
                rm -f rpm_video.mp4
              fi
            fi
          done

          # Try Invidious API direct download
          echo "=== Trying Invidious API direct stream download ==="
          for API in "https://inv.nadeko.net" "https://invidious.nerdvpn.de" "https://iv.datura.network" "https://yewtu.be"; do
            echo "--- Trying $API ---"
            JSON=$(curl -s --max-time 15 "$API/api/v1/videos/$VIDEO_ID")
            STREAM_URL=$(echo "$JSON" | python3 -c "
          import json,sys
          try:
            d=json.load(sys.stdin)
            for s in d.get('formatStreams',[]):
              q = s.get('qualityLabel','')
              if '720' in q or '480' in q or '360' in q:
                print(s['url']); sys.exit(0)
            fs = d.get('formatStreams',[])
            if fs: print(fs[-1]['url'])
          except Exception as e:
            print('',file=sys.stderr)
          " 2>/dev/null)
            if [ -n "$STREAM_URL" ]; then
              echo "Found stream URL from $API, downloading..."
              curl -L --max-time 600 -o rpm_video.mp4 "$STREAM_URL"
              if [ -f rpm_video.mp4 ] && [ -s rpm_video.mp4 ]; then
                SIZE=$(stat -c%s rpm_video.mp4)
                echo "Downloaded $SIZE bytes"
                if [ "$SIZE" -gt 10000 ]; then
                  echo "SUCCESS with $API!"
                  exit 0
                fi
              fi
              rm -f rpm_video.mp4
            fi
          done

          echo "All strategies failed"
          exit 1

      - name: Upload as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpm-video
          path: rpm_video.mp4
          retention-days: 1
          if-no-files-found: ignore
